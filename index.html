<html lang="en">
<head>

<title>My Raver Life — EDC Vegas 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1018;
    --surface: #181a28;
    --surface-2: #21243a;
    --border: #2d3050;
    --text: #f5f3ee;
    --muted: #8a8ca8;
    --accent: #ff2e8a;
    --accent-2: #00d4ff;
    --warn: #ffd166;
    --kineticFIELD: #ff5aa0;
    --circuitGROUNDS: #2cc8ff;
    --neonGARDEN: #5cff3a;
    --cosmicMEADOW: #d39bff;
    --bassPOD: #2dd4c0;
    --wasteLAND: #ff5560;
    --quantumVALLEY: #8b8dff;
    --stereoBLOOM: #ff95dd;
    --bionicJUNGLE: #a3e635;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    font-size: 16.5px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub {
    color: var(--text);
    opacity: 0.75;
    font-size: 14.5px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 0.1px;
  }
  .year-tag {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .row {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
  }
  .nights {
    display: flex; gap: 6px;
  }
  .night-btn, .mode-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .night-btn.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: white;
    font-weight: 600;
  }
  .help-btn {
    margin-left: auto;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .help-btn:hover { color: var(--text); border-color: var(--paper-dim, var(--muted)); }

  .mode-toggle {
    margin-left: auto;
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }
  .mode-btn.active {
    background: var(--surface-2);
    color: var(--text);
  }
  main {
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  .bucket {
    margin-bottom: 18px;
  }
  .bucket-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .bucket-name {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text);
  }
  .bucket-time {
    font-size: 12.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .picks {
    display: flex; flex-direction: column; gap: 6px;
  }
  .pick {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left-width: 3px;
    border-radius: 8px;
    padding: 10px 12px;
    transition: background 0.15s ease;
    cursor: pointer;
  }
  .pick:hover { background: var(--surface-2); }
  .pick-artist {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .pick-stage {
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
    opacity: 0.85;
    white-space: nowrap;
  }
  .pick-stage .stage-part { font-weight: 700; }
  .pick-stage .sep { opacity: 0.4; margin: 0 4px; }
  .pick-stage .time-part { font-weight: 500; opacity: 0.75; font-variant-numeric: tabular-nums; }
  .pick-del {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    padding: 4px 6px; font-size: 16px;
    line-height: 1;
    border-radius: 4px;
  }
  .pick-del:hover { color: var(--accent); background: rgba(255,122,89,0.12); }
  .empty {
    color: var(--muted);
    font-size: 13px;
    padding: 12px 4px;
    font-style: italic;
  }
  .conflict {
    color: var(--warn);
    font-size: 11px;
    margin-top: 4px;
    padding: 0 4px;
  }
  .welcome-banner {
    background: linear-gradient(135deg, rgba(255,46,138,0.12), rgba(0,212,255,0.10));
    border: 1px solid rgba(255,46,138,0.25);
    padding: 14px 36px 14px 14px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text);
    position: relative;
  }
  .welcome-banner b { color: var(--accent); }
  .welcome-banner-close {
    position: absolute;
    top: 6px; right: 8px;
    background: none; border: none;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    font-family: inherit;
  }
  .welcome-banner-close:hover { color: var(--text); }

  /* tab nav */
  nav.tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 4px;
    background: rgba(14, 16, 24, 0.78);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    z-index: 15;
  }
  .tab {
    background: none; border: none;
    color: var(--muted);
    padding: 9px 22px;
    font-size: 13.5px;
    letter-spacing: 0.6px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    transition: color 180ms ease, background 180ms ease;
  }
  .tab.active {
    color: var(--text);
    background: rgba(255, 46, 138, 0.12);
  }
  .tab .ico { display: none; }

  /* stages view */
  .stage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left-width: 4px;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .stage-card h3 { margin: 0 0 4px; font-size: 15px; }
  .stage-card .genre { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .stage-card .desc { font-size: 13px; line-height: 1.5; color: var(--text); opacity: 0.9; }

  /* Map view — official illustrated map.png with invisible tap hotspots
     overlaid at each main stage. Hotspots only become visible on hover/tap. */
  .map-wrap {
    padding: 4px 0 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  .map-note {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.45;
    margin: 10px 4px 0;
    text-align: center;
    opacity: 0.75;
  }
  .map-note a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .map-img-container {
    position: relative;
    line-height: 0;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    touch-action: none;          /* JS owns pinch + pan gestures */
    -webkit-user-select: none;
    user-select: none;
  }
  .map-img {
    width: 100%;
    height: auto;
    display: block;
  }
  /* Stage marker — clean colored dot, name lives only in the popover. */
  .map-hotspot {
    position: absolute;
    width: 18px;
    height: 18px;
    margin-left: -9px;
    margin-top: -9px;
    border-radius: 50%;
    background: currentColor;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }
  .map-hotspot:hover,
  .map-hotspot:focus-visible {
    transform: scale(1.3);
    outline: none;
    z-index: 3;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.45), 0 0 0 3px rgba(255,255,255,0.22), 0 0 10px currentColor;
  }
  .map-hotspot.selected {
    transform: scale(1.5);
    z-index: 4;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.45), 0 0 0 4px rgba(255,255,255,0.28), 0 0 14px currentColor;
  }
  .map-hint {
    margin: 12px 4px 0;
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
    font-style: italic;
  }

  /* GPS "you are here" pin — pulsing cyan dot with directional cone above.
     Counter-scaled in JS so it stays the same on-screen size at any zoom. */
  .user-pin {
    position: absolute;
    width: 18px;
    height: 18px;
    margin-left: -9px;
    margin-top: -9px;
    pointer-events: none;
    z-index: 6;
    transform-origin: center center;
    transition: transform 0.05s linear;
  }
  .user-pin-dot {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--accent-2);
    border: 3px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 12px var(--accent-2);
  }
  .user-pin-pulse {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--accent-2);
    opacity: 0.4;
    animation: userPinPulse 2.2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes userPinPulse {
    0%   { transform: scale(0.6); opacity: 0.55; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  /* Directional cone — anchored at the dot center, extends "up" by default,
     rotated to phone heading. Uses conic-gradient for the beam shape. */
  .user-pin-cone {
    position: absolute;
    inset: -16px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background:
      conic-gradient(
        from 330deg,
        transparent 0deg,
        rgba(0, 212, 255, 0.55) 18deg,
        rgba(0, 212, 255, 0.05) 30deg,
        transparent 30deg
      );
    transform-origin: center center;
    pointer-events: none;
    transition: transform 0.12s linear;
  }

  /* Map status line (GPS errors, etc.) */
  .map-status {
    display: none;
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(14, 16, 24, 0.92);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 7;
    white-space: nowrap;
  }

  /* Zoom controls — top-right of the map */
  .map-zoom-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 4;
  }
  .map-zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(14, 16, 24, 0.85);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
  }
  .map-zoom-btn:active { background: var(--accent); border-color: var(--accent); }

  .map-zoom-target {
    transform-origin: center center;
    transition: transform 0.05s linear;
    will-change: transform;
  }

  .lineup-view {
    padding: 0 18px;
    max-width: 480px;
    margin: 0 auto;
  }
  /* Lineup's sticky bar must clear the page header (which is also sticky
     at top:0). --header-h is measured at runtime since header height
     varies between viewports. */
  .lineup-view .lineup-sticky {
    position: sticky;
    top: var(--header-h, 0px);
    z-index: 5;
    padding: 12px 0 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .lineup-view .artist-results {
    max-height: none;
    border-radius: 8px;
    display: block;
    border: 1px solid var(--border);
  }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: flex-end; justify-content: center;
    z-index: 30;
    backdrop-filter: blur(4px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
    border-top: 1px solid var(--border);
  }
  @media (min-width: 600px) {
    .modal-bg { align-items: center; }
    .modal { border-radius: 18px; }
  }
  .modal { position: relative; }
  .modal h2 {
    margin: 0 0 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    padding-right: 28px;
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    font-family: inherit;
    font-weight: 300;
    border-radius: 50%;
  }
  .modal-close:hover { color: var(--text); background: var(--surface-2); }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field input, .field select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 16px;        /* 16px+ prevents iOS auto-zoom on focus */
    font-family: inherit;
  }
  .input-wrap { position: relative; }
  .input-wrap input { padding-right: 32px; }
  .input-clear {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    padding: 6px 10px;
    font-family: inherit;
    display: none;
  }
  .input-clear.show { display: block; }
  .input-clear:hover { color: var(--text); }
  .input-clear:active { color: var(--accent); }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent-2);
  }

  /* ── Lineup search bar — pill, real icon, focus glow ───────────── */
  .search-bar {
    position: relative;
    margin-top: 10px;
  }
  .search-bar input {
    width: 100%;
    box-sizing: border-box;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 44px 12px 44px;
    font-size: 16px;       /* 16px+ prevents iOS auto-zoom */
    font-family: inherit;
    line-height: 1.2;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  .search-bar input::placeholder {
    color: var(--muted);
    opacity: 0.7;
  }
  .search-bar input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
    box-shadow: 0 0 0 4px rgba(255, 46, 138, 0.18);
  }
  .search-bar .search-ico {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    display: flex;
    transition: color 0.15s ease;
  }
  .search-bar input:focus + .search-ico,
  .search-bar input:focus ~ .search-ico { color: var(--accent); }
  .search-bar .input-clear {
    right: 6px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    padding: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    background: var(--surface);
    font-size: 18px;
  }
  .search-bar .input-clear.show { display: flex; }
  .search-bar .input-clear:hover { color: var(--text); background: var(--border); }
  /* day chips */
  .day-chips {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }

  /* Lineup toolbar: 🔴 Now (filter) on the left + Sort toggle (A-Z / Stages) on the right.
     The #timeBuckets element is reused as the toolbar container. */
  .time-buckets {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }
  .tool-spacer { flex: 1 1 auto; }
  .tool-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s ease;
  }
  .tool-btn.now-chip { gap: 5px; }
  /* ON: solid red fill so the toggle state reads at a glance — no extra glow. */
  .tool-btn.now-chip.active {
    background: #ff3b3b;
    border-color: #ff3b3b;
    color: #fff;
  }
  .tool-btn.now-chip.active .now-dot {
    background: #fff;
    box-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
  }
  .now-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff3b3b;
    animation: nowPulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
    box-shadow: 0 0 4px #ff3b3b;
  }
  @keyframes nowPulse {
    0%, 100% { opacity: 0.45; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.35); }
  }
  /* Sort toggle — segmented control (Name / Stage) */
  .sort-toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px;
    gap: 0;
  }
  .sort-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s ease;
  }
  .sort-btn.active {
    background: var(--surface-2);
    color: var(--text);
  }

  /* Stage section header (when sorted by Stage) — also a tap target that
     fills the search bar with the stage id, narrowing the list to that stage. */
  .lineup-stage-header {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 12px 12px 6px;
    background: var(--bg);
    border: none;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease;
  }

<body>

<header>
  <h1 id="appTitle">My Raver Life</h1>
  <div class="sub" id="appSub">EDC Las Vegas <span class="year-tag">2026</span> · May 15–17</div>
  <div class="row" id="planControls">
    <div class="nights">
      <button class="night-btn active" data-night="1">Fri</button>
      <button class="night-btn" data-night="2">Sat</button>
      <button class="night-btn" data-night="3">Sun</button>
    </div>
  </div>
</header>

<main id="main"></main>

<div id="lineupView" class="lineup-view" style="display:none">
  <div class="lineup-sticky">
    <div class="day-chips" id="dayChips"></div>
    <div class="search-bar">
      <input id="artistInput" type="text" placeholder="search artist or stage…" autocomplete="off" enterkeyhint="search" />
      <span class="search-ico" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </span>
      <button type="button" id="clearArtistBtn" class="input-clear" aria-label="Clear">×</button>
    </div>
    <div class="time-buckets" id="timeBuckets"></div>
  </div>
  <div class="artist-results" id="artistResults"></div>
</div>

<footer class="app-footer">
  <div class="byline">
    made with PLUR by <a class="ig-text" href="https://www.instagram.com/thequguy" target="_blank" rel="noopener">@thequguy</a>  ·  say hi at EDC ✌
  </div>
  <p class="copyright-bottom">Unofficial fan-made schedule. Not affiliated with Insomniac or EDC. All trademarks belong to their owners. © 2026 Hung Pham</p>
</footer>

<nav class="tabs">
  <button class="tab" data-tab="lineup">Lineup</button>
  <button class="tab active" data-tab="plan">My Schedule</button>
  <button class="tab" data-tab="map">Map</button>
  <button class="tab" data-tab="help">Help</button>
</nav>

<script>
  // Festival-specific data is loaded from festival.config.js (window.FESTIVAL).
  // The rest of this script is festival-agnostic.
  const STAGES = window.FESTIVAL.stages;
  const BUCKETS = window.FESTIVAL.buckets;

  // Inject festival branding into the static header (HTML allowed in subtitle).
  document.getElementById('appTitle').textContent = window.FESTIVAL.appName;
  document.getElementById('appSub').innerHTML = window.FESTIVAL.subtitle;

  // Flat lineup: each entry { name, day, stage }. Loaded from assets/artists.json.
  let ARTISTS = [];
  function loadArtists() {
    return fetch('assets/artists.json')
      .then(r => r.ok ? r.json() : [])
      .then(data => { ARTISTS = Array.isArray(data) ? data : []; })
      .catch(() => { ARTISTS = []; });
  }
  // Returns existing pick.id if user has hearted this artist (same name+day+stage), else null.
  function findPickIdForArtist(a) {
    const list = state.picks[a.day] || [];
    const target = a.name.toLowerCase();
    const hit = list.find(p =>
      p.artist.toLowerCase() === target && p.stage === a.stage
    );
    return hit ? hit.id : null;
  }

  // Heart toggle: add the artist as a pick (with their real lineup time) or remove if already there.
  function toggleHeartArtist(a) {
    const existing = findPickIdForArtist(a);
    if (existing) {
      deletePick(existing);
      return;
    }
    const startMins = timeStrToMins(a.start);
    const endMins = timeStrToMins(a.end);
    const hasTime = startMins != null && endMins != null && endMins > startMins;
    const pick = {
      id: uid(),
      artist: a.name,
      stage: a.stage,
      bucket: hasTime ? bucketFromMinutes(startMins) : 'peak',
      startMins: hasTime ? startMins : null,
      endMins: hasTime ? endMins : null,
      image: a.image || null,
    };
    if (!state.picks[a.day]) state.picks[a.day] = [];
    state.picks[a.day].push(pick);
    save();
    renderArtistResults(artistInput.value);
    render();
  }

  function findStageForArtist(night, artistName) {
    const target = artistName.trim().toLowerCase();
    const hit = ARTISTS.find(a => a.day === night && a.name.toLowerCase() === target);
    return hit ? hit.stage : null;
  }
  function artistsForNight(night, stageId) {
    return ARTISTS
      .filter(a => a.day === night && (!stageId || a.stage === stageId))
      .map(a => a.name);
  }

  const KEY = 'edcplanner-v1';
  const state = Object.assign({
    night: 1,
    mode: 'assumed',
    picks: { 1: [], 2: [], 3: [] },
    tab: 'plan',
    welcomeDismissed: false,
  }, load() || {});

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true; // iOS
  }
  function isMobile() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  }

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; }
  }
  function save() {
    localStorage.setItem(KEY, JSON.stringify(state));
  }
  function uid() { return Math.random().toString(36).slice(2, 9); }
  function stage(id) { return STAGES.find(s => s.id === id) || STAGES[0]; }

  // Time helpers — minutes counted from festival start (FESTIVAL.dayStartHour).
  const DAY_START_HOUR = window.FESTIVAL.dayStartHour;
  const DAY_END_HOUR_24 = (DAY_START_HOUR + Math.ceil(window.FESTIVAL.dayLengthMins / 60)) % 24;

  function formatMins(m) {
    const h24 = Math.floor((m / 60 + DAY_START_HOUR) % 24);
    const min = m % 60;
    let h12 = h24 % 12;
    if (h12 === 0) h12 = 12;
    const ampm = h24 < 12 ? 'am' : 'pm';
    return `${h12}:${String(min).padStart(2, '0')}${ampm}`;
  }
  // Parse "23:30" / "11:30pm" / "1:00am" → minutes from festival start. null if outside window.
  function timeStrToMins(str) {
    if (!str) return null;
    const s = String(str).trim().toLowerCase();
    let h = null, min = 0;
    let m = s.match(/^(\d{1,2}):(\d{2})$/);
    if (m) { h = parseInt(m[1], 10); min = parseInt(m[2], 10); }
    else {
      m = s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/);
      if (!m) return null;
      h = parseInt(m[1], 10);
      min = m[2] ? parseInt(m[2], 10) : 0;
      if (m[3] === 'pm' && h !== 12) h += 12;
      if (m[3] === 'am' && h === 12) h = 0;
    }
    // Festival window: from DAY_START_HOUR ... wraps around midnight if overnight.
    if (h >= DAY_START_HOUR) return (h - DAY_START_HOUR) * 60 + min;
    if (h < DAY_END_HOUR_24) return (h + (24 - DAY_START_HOUR)) * 60 + min;
    return null;
  }
  // Map a time (mins from festival start) to one of the configured buckets
  // by checking each bucket's [start, end] range. Default: middle bucket.
  function bucketFromMinutes(mins) {
    if (mins == null) return BUCKETS[Math.floor(BUCKETS.length / 2)].id;
    for (const b of BUCKETS) {
      if (mins >= b.range[0] && mins < b.range[1]) return b.id;
    }
    return BUCKETS[BUCKETS.length - 1].id; // past last bucket → final bucket
  }
  const TIME_OPTIONS = (() => {
    const opts = [];
    for (let m = 0; m <= 630; m += 15) opts.push({ mins: m, label: formatMins(m) });
    return opts;
  })();
  function escape(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  const main = document.getElementById('main');
  const planControls = document.getElementById('planControls');
  const lineupView = document.getElementById('lineupView');
  const pageHeader = document.querySelector('header');

  window.addEventListener('resize', syncHeaderHeightVar);
  window.addEventListener('load', syncHeaderHeightVar);

  // GPS bounding box of the festival on the map image (corners of map.png).
  // Approximations from Las Vegas Motor Speedway location — tune as needed.
  const MAP_BOUNDS = {
    north: 36.2790,
    south: 36.2660,
    west:  -115.0210,
    east:  -115.0030,
  };
  // Map image's true heading (deg from north). 0 = north-up. EDC's official
  // map is roughly north-up; tune if the compass arrow points wrong on-site.
  const MAP_ROTATION_DEG = 0;

  function gpsToMapPercent(lat, lng) {
    const top  = ((MAP_BOUNDS.north - lat) / (MAP_BOUNDS.north - MAP_BOUNDS.south)) * 100;
    const left = ((lng - MAP_BOUNDS.west) / (MAP_BOUNDS.east - MAP_BOUNDS.west))   * 100;
    const inBounds = top >= 0 && top <= 100 && left >= 0 && left <= 100;
    return { left, top, inBounds };
  }

  function renderMap() {
    main.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'map-wrap';

    wrap.innerHTML = `
      <div class="map-img-container" id="mapContainer">
        <div class="map-zoom-target" id="mapZoomTarget">
          <img class="map-img" src="https://d3vhc53cl8e8km.cloudfront.net/hello-staging/wp-content/uploads/sites/21/2025/05/13125821/edclv_2025_de_festival_map_1080x1350_r02_v01.png" alt="EDC Las Vegas festival map" draggable="false" />

    wrap.querySelector('#gpsBtn').onclick = (e) => { e.stopPropagation(); locateUser(); };
  }

  // ── GPS "you are here" ──────────────────────────────────────────────────
  let userHeading = null;
  let compassAttached = false;

  function setMapStatus(msg) {
    const s = document.getElementById('mapStatus');
    if (s) {
      s.textContent = msg || '';
      s.style.display = msg ? 'block' : 'none';
    }
  }

  function locateUser() {
    if (!navigator.geolocation) {
      setMapStatus('GPS not available');
      setTimeout(() => setMapStatus(''), 2200);
      return;
    }
    setMapStatus('finding you…');
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        const p = gpsToMapPercent(latitude, longitude);
        placePin(p.left, p.top);
        // If zoomed in, recenter the view so the pin is visible.
        if (mapZoom.panToImagePct) mapZoom.panToImagePct(p.left, p.top);
        setMapStatus('');
        startCompass();
      },
      (err) => {
        setMapStatus(err.code === 1 ? 'permission denied' : 'no GPS fix');
        setTimeout(() => setMapStatus(''), 2500);
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 30000 }
    );
  }

  function placePin(leftPct, topPct) {
    const pin = document.getElementById('userPin');
    if (!pin) return;
    pin.style.left = Math.max(0, Math.min(100, leftPct)) + '%';
    pin.style.top  = Math.max(0, Math.min(100, topPct))  + '%';
    pin.style.display = '';
  }

  function startCompass() {
    if (compassAttached) return;
    // iOS 13+ requires explicit permission via user gesture (the GPS button).
    const Req = window.DeviceOrientationEvent && window.DeviceOrientationEvent.requestPermission;
    if (typeof Req === 'function') {
      Req().then(perm => {
        if (perm === 'granted') attachCompass();
      }).catch(() => {});
    } else {
      attachCompass();
    }
  }

  function attachCompass() {
    if (compassAttached) return;
    compassAttached = true;
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
  }

  // Smoothing buffer for compass — phone sensors fire at 30+ Hz which makes
  // the cone twitch. We low-pass-filter and throttle DOM writes via rAF.
  let smoothedHeading = null;
  let conePending = false;
  const SMOOTH_FACTOR = 0.18;     // 0 = no smoothing, 1 = no smoothing-effect

  function onOrient(e) {
    let heading = null;
    if (typeof e.webkitCompassHeading === 'number') {
      heading = e.webkitCompassHeading;       // iOS: clockwise from true north
    } else if (e.alpha != null && e.absolute) {
      heading = (360 - e.alpha) % 360;         // standard alpha is counterclockwise
    }
    if (heading == null) return;

    if (smoothedHeading == null) {
      smoothedHeading = heading;
    } else {
      // Handle the 360/0 wrap so we always rotate the short way.
      let diff = heading - smoothedHeading;
      if (diff > 180)  diff -= 360;
      if (diff < -180) diff += 360;
      smoothedHeading = (smoothedHeading + diff * SMOOTH_FACTOR + 360) % 360;
    }
    userHeading = smoothedHeading;

    if (!conePending) {
      conePending = true;
      requestAnimationFrame(() => {
        conePending = false;
        const cone = document.getElementById('userPinCone');
        if (cone) cone.style.transform = `rotate(${smoothedHeading - MAP_ROTATION_DEG}deg)`;
      });
    }
  }

  // Module-scoped so other map features (drop-pin) can read the live state.
  const mapZoom = { scale: 1, tx: 0, ty: 0, container: null };

  // Inline pinch-zoom + pan for the map. Single transform (scale + translate)
  // applied to the zoom-target so img + hotspots scale together.
  function setupMapZoom(container, target) {
    mapZoom.container = container;
    let scale = mapZoom.scale = 1, tx = mapZoom.tx = 0, ty = mapZoom.ty = 0;
    const MIN = 1, MAX = 4;

    function clamp() {
      // Keep scaled content within container bounds (no panning into empty space).
      const cw = container.clientWidth, ch = container.clientHeight;
      const maxX = Math.max(0, (cw * scale - cw) / 2);
      const maxY = Math.max(0, (ch * scale - ch) / 2);
      tx = Math.max(-maxX, Math.min(maxX, tx));
      ty = Math.max(-maxY, Math.min(maxY, ty));
    }
    function apply() {
      clamp();
      target.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      mapZoom.scale = scale; mapZoom.tx = tx; mapZoom.ty = ty;
      // Counter-scale GPS pin so it stays constant on-screen (Google Maps style)
      const pin = document.getElementById('userPin');
      if (pin) pin.style.transform = `scale(${1 / scale})`;
    }
    function reset() { scale = 1; tx = 0; ty = 0; apply(); }

    // If the pin is offscreen, recenter the viewport on it. If it's already
    // visible, leave the map alone. Math accounts for transform-origin: center.
    mapZoom.panToImagePct = (leftPct, topPct) => {
      if (scale <= 1) return; // at zoom 1 the whole map is visible
      const cw = container.clientWidth, ch = container.clientHeight;
      const imgX = (leftPct / 100) * cw;
      const imgY = (topPct  / 100) * ch;
      // Real screen position with center transform-origin:
      // screenX = tx + imgX*scale + cw/2*(1-scale)
      const offX = (cw / 2) * (1 - scale);
      const offY = (ch / 2) * (1 - scale);
      const screenX = tx + imgX * scale + offX;
      const screenY = ty + imgY * scale + offY;
      const MARGIN = 32;
      const inView = screenX >= MARGIN && screenX <= cw - MARGIN
                  && screenY >= MARGIN && screenY <= ch - MARGIN;
      if (inView) return;    // already visible — leave the map alone
      // Pan to center the pin: solve screenX_target = cw/2.
      tx = (cw / 2 - imgX) * scale;
      ty = (ch / 2 - imgY) * scale;
      apply();
    };

    // Buttons
    container.querySelectorAll('.map-zoom-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const action = btn.dataset.zoom;
        if (action === 'in')        scale = Math.min(MAX, scale * 1.5);
        else if (action === 'out')  scale = Math.max(MIN, scale / 1.5);
        else if (action === 'reset') { reset(); return; }
        apply();
      };
    });

    // Pinch-zoom (2 fingers) + pan (1 finger when zoomed)
    let pinchStart = null, panStart = null;
    function dist(t) {
      const dx = t[0].clientX - t[1].clientX;
      const dy = t[0].clientY - t[1].clientY;
      return Math.hypot(dx, dy);
    }
    function midpoint(t) {
      return {
        x: (t[0].clientX + t[1].clientX) / 2,
        y: (t[0].clientY + t[1].clientY) / 2,
      };
    }

    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        pinchStart = { dist: dist(e.touches), scale, mid: midpoint(e.touches), tx, ty };
        panStart = null;
      } else if (e.touches.length === 1 && scale > 1) {
        panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
        pinchStart = null;
      }
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
      // Always block native scrolling when the touch started on the map —
      // otherwise iOS lets a 1-finger drag at scale=1 move the page.
      e.preventDefault();
      if (e.touches.length === 2 && pinchStart) {
        const newDist = dist(e.touches);
        scale = Math.max(MIN, Math.min(MAX, pinchStart.scale * (newDist / pinchStart.dist)));
        apply();
      } else if (e.touches.length === 1 && panStart && scale > 1) {
        tx = panStart.tx + (e.touches[0].clientX - panStart.x);
        ty = panStart.ty + (e.touches[0].clientY - panStart.y);
        apply();
      }
    }, { passive: false });

    container.addEventListener('touchend', (e) => {
      // Pinch ended (one finger lifted)? Transition to pan with remaining finger.
      if (e.touches.length < 2) pinchStart = null;
      if (e.touches.length === 0) {
        panStart = null;
      } else if (e.touches.length === 1 && !panStart && scale > 1) {
        panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
      }
    });

    // ── Desktop input (MacBook / mouse / trackpad) ──────────────────────
    function setCursor() {
      container.style.cursor = dragStart
        ? 'grabbing'
        : (scale > 1 ? 'grab' : '');
    }

    // Click-and-drag to pan (only when zoomed in).
    let dragStart = null;
    container.addEventListener('mousedown', (e) => {
      if (scale <= 1) return;
      if (e.target.closest('.map-zoom-btn') || e.target.closest('.user-pin')) return;
      dragStart = { x: e.clientX, y: e.clientY, tx, ty };
      setCursor();
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragStart) return;
      tx = dragStart.tx + (e.clientX - dragStart.x);
      ty = dragStart.ty + (e.clientY - dragStart.y);
      apply();
    });
    window.addEventListener('mouseup', () => {
      if (!dragStart) return;
      dragStart = null;
      setCursor();
    });

    // Wheel / trackpad scroll = zoom. Trackpad pinch on macOS fires wheel
    // events with ctrlKey=true and a larger deltaY — handle both naturally.
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.ctrlKey ? 0.02 : 0.005;  // pinch is more sensitive
      const next = scale * Math.exp(-e.deltaY * factor);
      scale = Math.max(MIN, Math.min(MAX, next));
      if (scale === 1) { tx = 0; ty = 0; }
      apply();
      setCursor();
    }, { passive: false });

    // Double-tap (touch) / double-click (mouse) toggles zoom.
    let lastTap = 0;
    container.addEventListener('click', (e) => {
      if (e.target.closest('.map-zoom-btn') || e.target.closest('.user-pin')) return;
      const now = Date.now();
      if (now - lastTap < 300) {
        scale = scale > 1 ? 1 : 2.2;
        if (scale === 1) { tx = 0; ty = 0; }
        apply();
        setCursor();
      }
      lastTap = now;
    });
  }

  function renderPlan() {
    document.querySelectorAll('.night-btn').forEach(b => {
      b.classList.toggle('active', Number(b.dataset.night) === state.night);
    });

    const picks = state.picks[state.night] || [];
    main.innerHTML = '';
    main.appendChild(renderTimeline(picks));
  }

  // Pixels per minute on the timeline. 1.7 = ~102px/hour.
  const TIMELINE_PPM = 1.7;
  const HOUR_LABELS = window.FESTIVAL.hourLabels;
  const FESTIVAL_LENGTH_MINS = window.FESTIVAL.dayLengthMins;

  // Assign each pick a lane (column) within its overlap cluster so blocks split horizontally.
  function layoutLanes(picks) {
    const valid = picks.filter(p =>
      typeof p.startMins === 'number' && typeof p.endMins === 'number'
    ).slice().sort((a, b) => a.startMins - b.startMins);

    const layouts = []; // { pick, lane, totalLanes }
    let i = 0;
    while (i < valid.length) {
      // Build cluster of overlapping picks starting at i
      const cluster = [valid[i]];
      let clusterEnd = valid[i].endMins;
      let j = i + 1;
      while (j < valid.length && valid[j].startMins < clusterEnd) {
        cluster.push(valid[j]);
        clusterEnd = Math.max(clusterEnd, valid[j].endMins);
        j++;
      }
      // Within cluster, greedy lane assignment
      const lanes = []; // lane index → latest endMins occupying that lane
      const clusterLayout = [];
      for (const p of cluster) {
        let lane = lanes.findIndex(end => end <= p.startMins);
        if (lane === -1) { lane = lanes.length; lanes.push(p.endMins); }
        else { lanes[lane] = p.endMins; }
        clusterLayout.push({ pick: p, lane });
      }
      const total = lanes.length;
      for (const c of clusterLayout) layouts.push({ ...c, totalLanes: total });
      i = j;
    }
    return layouts;
  }

  function renderTimeline(picks) {
    const wrap = document.createElement('div');
    wrap.className = 'timeline';
    const totalHeight = FESTIVAL_LENGTH_MINS * TIMELINE_PPM + 12;
    wrap.style.height = totalHeight + 'px';

    // Hour labels + grid lines
    HOUR_LABELS.forEach(h => {
      const top = h.mins * TIMELINE_PPM;
      const lbl = document.createElement('div');
      lbl.className = 'timeline-hour';
      lbl.style.top = top + 'px';
      lbl.textContent = h.label;
      wrap.appendChild(lbl);
      const line = document.createElement('div');
      line.className = 'timeline-line';
      line.style.top = top + 'px';
      wrap.appendChild(line);
    });

    // Blocks live in a wrapper that starts after the hour gutter
    const blocksArea = document.createElement('div');
    blocksArea.className = 'timeline-blocks';
    wrap.appendChild(blocksArea);

    // Pick blocks with lane layout — side-by-side blocks at the same time
    // ARE the overlap signal. No explicit warning needed.
    const layouts = layoutLanes(picks);
    layouts.forEach(({ pick, lane, totalLanes }) => {
      const s = stage(pick.stage);
      const top = pick.startMins * TIMELINE_PPM;
      const height = Math.max(28, (pick.endMins - pick.startMins) * TIMELINE_PPM - 2);
      const widthPct = 100 / totalLanes;
      const leftPct = lane * widthPct;

      const block = document.createElement('div');
      block.className = 'timeline-block';
      block.style.top = top + 'px';
      block.style.height = height + 'px';
      block.style.left = `calc(${leftPct}% + ${leftPct > 0 ? 1 : 0}px)`;
      block.style.width = `calc(${widthPct}% - 3px)`;
      block.style.borderLeftColor = s.color;

      const timeText = `${formatMins(pick.startMins)}–${formatMins(pick.endMins)}`;
      const imageUrl = pick.image || (() => {
        const t = pick.artist.toLowerCase();
        const hit = ARTISTS.find(x =>
          x.name.toLowerCase() === t && x.stage === pick.stage
        );
        return hit ? hit.image : null;
      })();
      const imgHTML = imageUrl
        ? `<img class="b-img" src="${escape(imageUrl)}" loading="lazy" alt="" onerror="this.style.display='none'" />`
        : '';
      block.innerHTML = `
        ${imgHTML}
        <div class="b-content">
          <div class="b-artist">${escape(pick.artist)}</div>
          <div class="b-stageline" style="color:${s.color}">${escape(s.id)}</div>
          <div class="b-time">${escape(timeText)}</div>
        </div>
        <button class="b-del" aria-label="Remove from schedule">♥</button>
      `;
      block.querySelector('.b-del').onclick = () => deletePick(pick.id);
      blocksArea.appendChild(block);
    });
    return wrap;
  }

  // Lineup view DOM references
  const artistInput = document.getElementById('artistInput');
  // Smart default for the day chip — pure-local logic, works offline.
  // Pre-festival → Friday · During festival night → that day · Post-festival → Sunday.
  let selectedDay = (() => {
    const ctx = currentFestivalContext();
    if (ctx) return ctx.dayId;
    const ts = appNow().getTime();
    const fri5pm = new Date(2026, 4, 15, 17).getTime();
    const sat5pm = new Date(2026, 4, 16, 17).getTime();
    const sun5pm = new Date(2026, 4, 17, 17).getTime();
    const mon7am = new Date(2026, 4, 18,  7).getTime();
    if (ts <  fri5pm) return 1;
    if (ts >= mon7am) return 3;
    if (ts <  sat5pm) return 2;
    if (ts <  sun5pm) return 3;
    return 3;
  })();
  let selectedNow = false;         // Now filter — show only currently-playing acts
  let selectedSort = 'name';       // 'name' (A-Z) or 'stage' (grouped by stage)

  const DAY_LABELS = window.FESTIVAL.days;
  const dayChips = document.getElementById('dayChips');

  function renderDayChips() {
    dayChips.innerHTML = '';
    DAY_LABELS.forEach(d => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'day-chip' + (d.id === selectedDay ? ' active' : '');
      btn.innerHTML = `<span class="name">${d.name}</span><span class="sub">${d.sub}</span>`;
      btn.onclick = () => {
        if (selectedDay === d.id) return;
        selectedDay = d.id;
        // Switching day = explicit intent to see another day. "Now" only
        // makes sense for the current festival night, so auto-clear it.
        // Search persists (independent of day; smart-fallback handles misses).
        if (selectedNow) {
          selectedNow = false;
          renderTimeBuckets();
        }
        renderDayChips();
        renderArtistResults(artistInput.value);
      };
      dayChips.appendChild(btn);
    });
  }

  // Time-bucket chips — Opener / Mid / Peak / Late / Sunrise.
  // Default = any time; tap a chip to filter, tap same chip to clear.
  const timeBucketsEl = document.getElementById('timeBuckets');

  // Single source of "now" — supports the ?now=... testing override.
  function appNow() {
    const override = new URLSearchParams(window.location.search).get('now');
    const d = override ? new Date(override) : new Date();
    return isNaN(d.getTime()) ? new Date() : d;
  }

  // Current festival context: which night is it (1/2/3) and how many minutes
  // into that night are we? Returns null when not within festival hours.
  // Hardcoded to EDC LV 2026: May 15-17 5pm to next-morning 6am.
  function currentFestivalContext() {
    const now = appNow();
    if (now.getFullYear() !== 2026 || now.getMonth() !== 4) return null; // not May 2026
    const d = now.getDate();
    const h = now.getHours();
    const m = now.getMinutes();
    let dayId = null;
    if      (d === 15 && h >= 17)               dayId = 1;  // Fri 5pm onward
    else if (d === 16 && h <  7)                dayId = 1;  // Fri night → Sat dawn
    else if (d === 16 && h >= 17)               dayId = 2;
    else if (d === 17 && h <  7)                dayId = 2;
    else if (d === 17 && h >= 17)               dayId = 3;
    else if (d === 18 && h <  7)                dayId = 3;
    if (dayId == null) return null;
    const DS = window.FESTIVAL.dayStartHour;
    const nowMins = h >= DS ? (h - DS) * 60 + m : (h + 24 - DS) * 60 + m;
    return { dayId, nowMins };
  }

  // Lineup toolbar: 🔴 Now (filter) + Sort toggle (A-Z / Stages).
  function renderTimeBuckets() {
    if (!timeBucketsEl) return;
    timeBucketsEl.innerHTML = '';

    // Now chip
    const nowBtn = document.createElement('button');
    nowBtn.type = 'button';
    nowBtn.className = 'tool-btn now-chip' + (selectedNow ? ' active' : '');
    nowBtn.innerHTML = `<span class="now-dot"></span>Now`;
    nowBtn.onclick = () => {
      selectedNow = !selectedNow;
      if (selectedNow) {
        const ctx = currentFestivalContext();
        if (ctx && selectedDay !== ctx.dayId) {
          selectedDay = ctx.dayId;
          renderDayChips();
        }
      }
      renderTimeBuckets();
      renderArtistResults(artistInput.value);
    };
    timeBucketsEl.appendChild(nowBtn);

    // Spacer pushes the sort toggle to the right
    const spacer = document.createElement('div');
    spacer.className = 'tool-spacer';
    timeBucketsEl.appendChild(spacer);

    // Sort toggle (A-Z / Time / Stages) — segmented control
    const sortWrap = document.createElement('div');
    sortWrap.className = 'sort-toggle';
    [['name', 'Name'], ['time', 'Time'], ['stage', 'Stage']].forEach(([id, label]) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'sort-btn' + (selectedSort === id ? ' active' : '');
      b.textContent = label;
      b.onclick = () => {
        if (selectedSort === id) return;
        selectedSort = id;
        renderTimeBuckets();
        renderArtistResults(artistInput.value);
      };
      sortWrap.appendChild(b);
    });
    timeBucketsEl.appendChild(sortWrap);
  }

  const clearArtistBtn = document.getElementById('clearArtistBtn');
  function syncClearBtn() {
    clearArtistBtn.classList.toggle('show', artistInput.value.trim().length > 0);
  }

  // Live search as user types
  artistInput.addEventListener('input', (e) => {
    syncClearBtn();
    renderArtistResults(e.target.value);
  });
  artistInput.addEventListener('focus', () => {
    syncClearBtn();
    renderArtistResults(artistInput.value);
  });
  clearArtistBtn.addEventListener('click', () => {
    artistInput.value = '';
    syncClearBtn();
    renderArtistResults('');
    artistInput.focus();
  });

  const artistResults = document.getElementById('artistResults');

  function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function highlight(name, query) {
    if (!query) return escape(name);
    const q = escRe(query.trim());
    if (!q) return escape(name);
    const re = new RegExp(`(${q})`, 'ig');
    return escape(name).replace(re, '<mark>$1</mark>');
  }

  function renderArtistResults(query) {
    const q = (query || '').trim().toLowerCase();
    const isNow = selectedNow;
    const nowCtx = isNow ? currentFestivalContext() : null;
    const all = ARTISTS
      .filter(a => selectedDay == null || a.day === selectedDay)
      .filter(a => {
        if (!isNow) return true;
        if (!nowCtx) return false;
        if (a.day !== nowCtx.dayId) return false;
        const sm = timeStrToMins(a.start);
        const em = timeStrToMins(a.end);
        if (sm == null || em == null) return false;
        return sm <= nowCtx.nowMins && em >= nowCtx.nowMins;
      })
      .slice();
    // Sort: A-Z (name), Time (chronological), or Stages (grouped + time within).
    // Now respects the chosen sort — combos like Now+A-Z or Now+Stage are useful.
    const useTimeSort = selectedSort === 'time';
    if (useTimeSort) {
      all.sort((a, b) =>
        ((timeStrToMins(a.start) ?? 0) - (timeStrToMins(b.start) ?? 0))
        || a.name.localeCompare(b.name)
      );
    } else if (selectedSort === 'stage') {
      // Group order: stages as defined in festival.config.js; within stage, by time.
      const stageOrder = Object.fromEntries(STAGES.map((s, i) => [s.id, i]));
      all.sort((a, b) => {
        const sa = stageOrder[a.stage] ?? 99;
        const sb = stageOrder[b.stage] ?? 99;
        if (sa !== sb) return sa - sb;
        return ((timeStrToMins(a.start) ?? 0) - (timeStrToMins(b.start) ?? 0))
            || a.name.localeCompare(b.name);
      });
    } else {
      all.sort((a, b) =>
        a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
      );
    }
    // Match artist name OR stage id.
    const filtered = q
      ? all.filter(a =>
          a.name.toLowerCase().includes(q) ||
          a.stage.toLowerCase().includes(q)
        )
      : all;

    artistResults.innerHTML = '';
    if (filtered.length === 0) {
      const e = document.createElement('div');
      e.className = 'artist-result-empty';
      if (q) {
        // Smart fallback: ignore day + Now filters, find ALL name/stage matches.
        const allHits = ARTISTS.filter(a =>
          a.name.toLowerCase().includes(q) || a.stage.toLowerCase().includes(q)
        );
        const dayShort = { 1: 'Fri', 2: 'Sat', 3: 'Sun' };
        const dayName = { 1: 'Friday', 2: 'Saturday', 3: 'Sunday' };
        // Describe what the user IS filtering by, so the empty state explains
        // *why* nothing matched (not just "no results").
        const ctxParts = [];
        if (selectedDay) ctxParts.push(dayName[selectedDay]);
        if (isNow)       ctxParts.push('right now');
        const ctxStr = ctxParts.length ? ' on ' + ctxParts.join(' · ') : '';
        e.innerHTML = `<p style="margin:0 0 6px">No "${escape(query.trim())}"${ctxStr}.</p>`;
        if (allHits.length > 0) {
          // Group by day; for each day, surface a "switch to this day" button.
          const byDay = {};
          allHits.forEach(a => { (byDay[a.day] = byDay[a.day] || []).push(a); });
          const links = document.createElement('div');
          links.className = 'cross-day-links';
          Object.keys(byDay).map(Number).sort().forEach(d => {
            const sample = byDay[d][0];
            const sampleStartMin = timeStrToMins(sample.start);
            const sampleStart = sampleStartMin != null ? formatMins(sampleStartMin) : '';
            const more = byDay[d].length > 1 ? ` +${byDay[d].length - 1}` : '';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'switch-day-btn';
            btn.innerHTML = `Switch to <b>${dayShort[d]}</b> · <span class="muted">${escape(sample.name)} · ${sampleStart}${more}</span>`;
            btn.onclick = () => {
              selectedDay = d;
              selectedNow = false;          // clear Now so the matching artist isn't filtered out
              renderDayChips();
              renderTimeBuckets();
              renderArtistResults(artistInput.value);
            };
            links.appendChild(btn);
          });
          e.appendChild(links);
        }
        artistResults.appendChild(e);
      } else if (isNow && !nowCtx) {
        // Tailor the empty-state copy to where we are vs the festival window.
        const ts = appNow().getTime();
        const fri5pm = new Date(2026, 4, 15, 17).getTime();
        const mon7am = new Date(2026, 4, 18,  7).getTime();
        if (ts < fri5pm) {
          e.textContent = 'Festival drops Fri May 15 · 5pm.';
        } else if (ts >= mon7am) {
          e.textContent = 'EDC ’26 wrapped. PLUR forever.';
        } else {
          // Daytime gap — show which night is up next AND when its first set fires.
          // Day 1 has 5pm openers; Day 2 & 3 first sets are at 7pm.
          const sat5pm = new Date(2026, 4, 16, 17).getTime();
          const sun5pm = new Date(2026, 4, 17, 17).getTime();
          const next = ts < sat5pm ? { name: 'Saturday', start: '7pm' }
                     : ts < sun5pm ? { name: 'Sunday',   start: '7pm' }
                     : null;
          e.textContent = next
            ? `${next.name} kicks off at ${next.start}.`
            : 'Tonight kicks off soon.';
        }
        artistResults.appendChild(e);
      } else if (isNow && nowCtx) {
        e.textContent = 'Nothing playing right now on this day.';
        artistResults.appendChild(e);
      } else {
        e.textContent = 'No DJs in the lineup yet for this night.';
        artistResults.appendChild(e);
      }
    } else {
      const dayShort = { 1: 'Fri', 2: 'Sat', 3: 'Sun' };
      // For stage-grouped sort, insert a section header before each new stage.
      // Stage filter overrides (one stage already, no need for headers).
      const showStageHeaders = selectedSort === 'stage';
      let lastStage = null;
      filtered.forEach(a => {
        if (showStageHeaders && a.stage !== lastStage) {
          lastStage = a.stage;
          const sObj = stage(a.stage);
          const header = document.createElement('button');
          header.type = 'button';
          header.className = 'lineup-stage-header';
          header.setAttribute('aria-label', `Filter to ${sObj.id}`);
          header.innerHTML = `<span class="lsh-dot" style="background:${sObj.color}"></span><span class="lsh-name" style="color:${sObj.color}">${sObj.id}</span><span class="lsh-tap">tap to filter →</span>`;
          header.onclick = () => {
            artistInput.value = sObj.id;
            syncClearBtn();
            renderArtistResults(sObj.id);
            artistInput.focus();
          };
          artistResults.appendChild(header);
        }
        const s = stage(a.stage);
        const sm = timeStrToMins(a.start);
        const startLabel = sm != null ? formatMins(sm) : '';
        const existingPickId = findPickIdForArtist(a);
        const row = document.createElement('div');
        row.className = 'artist-result';
        const avatarHTML = a.image
          ? `<img class="avatar" src="${escape(a.image)}" loading="lazy" alt="" onerror="this.style.visibility='hidden'" />`
          : `<span class="avatar"></span>`;
        row.innerHTML = `
          ${avatarHTML}
          <span class="name">${highlight(a.name, query)}</span>
          <span class="stage-tag">
            ${startLabel ? `<span class="time-part">${startLabel}</span><span class="sep">·</span>` : ''}<span class="day-part">${dayShort[a.day] || ''}</span><span class="sep">·</span><span class="stage-part" style="color:${s.color}">${s.id}</span>
          </span>
          <button class="heart ${existingPickId ? 'on' : ''}" aria-label="${existingPickId ? 'Remove from schedule' : 'Add to schedule'}">${existingPickId ? '♥' : '♡'}</button>
        `;
        row.querySelector('.heart').onclick = (e) => { e.stopPropagation(); toggleHeartArtist(a); };
        artistResults.appendChild(row);
      });
    }
    artistResults.classList.add('show');
  }

  document.querySelectorAll('.night-btn').forEach(b => {
    b.onclick = () => { state.night = Number(b.dataset.night); save(); render(); };
  });

  function deletePick(pickId) {
    Object.values(state.picks).forEach(arr => {
      const i = arr.findIndex(x => x.id === pickId);
      if (i >= 0) arr.splice(i, 1);
    });
    save(); render();
  }

  document.querySelectorAll('.tab').forEach(b => {
    if (!b.dataset.tab) return; // skip helpTab and any non-navigation tabs
    b.onclick = () => { state.tab = b.dataset.tab; save(); render(); };
  });

  loadArtists().then(() => {
    // Re-sync existing picks against the lineup. Two reasons:
    //   1. Backfill missing image URLs (older picks before image was saved)
    //   2. Re-compute startMins/endMins/bucket — these depend on dayStartHour,
    //      and shifting the festival window moves all positions by an offset.
    let migrated = false;
    Object.values(state.picks).forEach(arr => {
      arr.forEach(p => {
        const t = p.artist.toLowerCase();
        const hit = ARTISTS.find(x =>
          x.name.toLowerCase() === t && x.stage === p.stage
        );
        if (!hit) return;
        if (!p.image && hit.image) { p.image = hit.image; migrated = true; }
        const newStart = timeStrToMins(hit.start);
        const newEnd   = timeStrToMins(hit.end);
        if (newStart != null && newEnd != null) {
          if (p.startMins !== newStart) { p.startMins = newStart; migrated = true; }
          if (p.endMins   !== newEnd)   { p.endMins   = newEnd;   migrated = true; }
          const newBucket = bucketFromMinutes(newStart);
          if (p.bucket !== newBucket)   { p.bucket    = newBucket; migrated = true; }
        }
      });
    });
    if (migrated) save();
    render();

    // Pre-warm all artist images so the lineup is fully offline-ready.
    // Without this, only avatars the user scrolled past get cached. We want
    // the festival case to work even if they just opened the app once at home.
    setTimeout(prewarmArtistImages, 800);
  });

  // Background-prefetch every artist avatar via Image() so the browser
  // requests them at low priority. The service worker intercepts and stores
  // them in the persistent images cache. Throttled to 6 at a time so we
  // don't hammer the CDN or saturate the user's connection.
  function prewarmArtistImages() {
    if (!ARTISTS || !ARTISTS.length) return;
    if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
    const urls = ARTISTS.map(a => a.image).filter(Boolean);
    let i = 0;
    const BATCH = 6;
    const DELAY = 120;
    function step() {
      for (let j = 0; j < BATCH && i < urls.length; j++, i++) {
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'lazy';
        img.src = urls[i];
      }
      if (i < urls.length) setTimeout(step, DELAY);
    }
    step();
  }

  // Service worker for offline support. New versions install in the background
  // and apply on the user's next app open.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('Service worker registration failed:', err));
    });
  }
</script>
</body>
</html>
